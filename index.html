<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkToQR - Cloudflare Edition</title>
    <!-- Library CSS & JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Custom styling agar QR lebih rapi */
        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans">

    <!-- Header Section -->
    <header class="bg-emerald-600 text-white py-12 shadow-lg text-center">
        <h1 class="text-4xl font-black tracking-tight mb-2">LinkToQR Pro 🚀</h1>
        <p class="text-emerald-100 font-medium">Bikin Barcode Foto HD via Cloudflare R2</p>
    </header>

    <!-- Main Container -->
    <main class="max-w-md w-full mx-auto p-6 bg-white rounded-3xl shadow-2xl -mt-10 mb-10 border border-slate-100">
        
        <!-- Tab Switcher (Pilih Mode) -->
        <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
            <button id="tabLink" class="flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm transition-all text-emerald-600">
                🔗 Google Drive
            </button>
            <button id="tabUpload" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-emerald-600">
                📷 Upload Foto
            </button>
        </div>

        <!-- Section 1: Google Drive Mode -->
        <div id="sectionLink" class="space-y-5">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Paste Link Drive</label>
                <input type="text" id="linkInput" placeholder="https://drive.google.com/..." 
                       class="w-full px-5 py-4 rounded-2xl border-2 border-slate-200 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/10 transition-all text-sm shadow-sm">
            </div>
            <button id="generateBtnLink" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                BUAT QR CODE ⚡
            </button>
        </div>

        <!-- Section 2: Upload Cloudflare Mode -->
        <div id="sectionUpload" class="hidden space-y-5">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Pilih File Foto</label>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <label for="fileInput" class="w-full border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-2xl py-10 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-100 transition-all group">
                    <div class="bg-emerald-600 text-white p-3 rounded-full mb-3 group-hover:scale-110 transition-transform shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <span id="fileName" class="text-xs font-bold text-emerald-700">Klik untuk pilih foto HD</span>
                </label>
            </div>
            <button id="generateBtnUpload" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                UPLOAD KE CLOUDFLARE 🚀
            </button>
            <div id="loadingUpload" class="hidden text-center py-2">
                <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-emerald-600 border-t-transparent mr-2"></div>
                <span class="text-xs text-slate-500 font-bold tracking-widest uppercase">Sedang memproses...</span>
            </div>
        </div>

        <!-- Area Hasil QR (Awalnya tersembunyi) -->
        <div id="resultArea" class="hidden mt-10 pt-10 border-t-2 border-slate-50 space-y-6">
            <div class="flex flex-col items-center justify-center p-8 bg-slate-900 rounded-[2.5rem] shadow-2xl">
                <div id="qrcode"></div>
                <div class="mt-6 text-center">
                    <p class="text-emerald-400 text-[10px] font-black tracking-[0.3em] uppercase">Scan to View Photo</p>
                    <p id="displayUrl" class="text-slate-500 text-[8px] mt-1 truncate max-w-[200px]"></p>
                </div>
            </div>
            
            <button id="downloadBtn" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-xl">
                SIMPAN BARCODE (PNG) 📥
            </button>
            
            <p class="text-center text-[10px] text-slate-400">Barcode ini akan langsung membuka foto secara full screen.</p>
        </div>

    </main>

    <footer class="text-slate-400 text-center py-8 text-xs mt-auto">
        &copy; 2026 <strong>LinkToQR</strong> &bull; Powered by Cloudflare Workers
    </footer>

    <script>
        // Konfigurasi URL Worker kamu
        const WORKER_URL = "https://jirlahh.rmcklvpn.workers.dev"; 

        const tabLink = document.getElementById('tabLink');
        const tabUpload = document.getElementById('tabUpload');
        const sectionLink = document.getElementById('sectionLink');
        const sectionUpload = document.getElementById('sectionUpload');
        const linkInput = document.getElementById('linkInput');
        const fileInput = document.getElementById('fileInput');
        const fileNameText = document.getElementById('fileName');
        const generateBtnLink = document.getElementById('generateBtnLink');
        const generateBtnUpload = document.getElementById('generateBtnUpload');
        const loadingUpload = document.getElementById('loadingUpload');
        const qrcodeDiv = document.getElementById('qrcode');
        const resultArea = document.getElementById('resultArea');
        const displayUrl = document.getElementById('displayUrl');

        // Logic Switch Tab
        tabLink.onclick = () => {
            tabLink.classList.add('bg-white', 'shadow-sm', 'text-emerald-600');
            tabUpload.classList.remove('bg-white', 'shadow-sm', 'text-emerald-600');
            sectionLink.classList.remove('hidden');
            sectionUpload.classList.add('hidden');
            resultArea.classList.add('hidden');
        };

        tabUpload.onclick = () => {
            tabUpload.classList.add('bg-white', 'shadow-sm', 'text-emerald-600');
            tabLink.classList.remove('bg-white', 'shadow-sm', 'text-emerald-600');
            sectionUpload.classList.remove('hidden');
            sectionLink.classList.add('hidden');
            resultArea.classList.add('hidden');
        };

        // File Selection Feedback
        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                fileNameText.innerText = "File terpilih: " + fileInput.files[0].name;
            }
        };

        // Fungsi Ambil ID Drive
        function getDriveId(url) {
            const parts = url.match(/[-\w]{25,}/);
            return parts ? parts[0] : null;
        }

        // Fungsi Render QR Code
        function renderQR(url) {
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, {
                text: url,
                width: 260,
                height: 260,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            displayUrl.innerText = url;
            resultArea.classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // --- Handle Mode: Google Drive ---
        generateBtnLink.onclick = () => {
            const fileId = getDriveId(linkInput.value);
            if(!fileId) {
                alert("Waduh! Link Google Drive-nya nggak valid, Bro.");
                return;
            }
            // Gunakan thumbnail HD untuk direct view
            const directUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w4000`;
            renderQR(directUrl);
        };

        // --- Handle Mode: Upload Cloudflare ---
        generateBtnUpload.onclick = async () => {
            const file = fileInput.files[0];
            if(!file) {
                alert("Pilih fotonya dulu dong, Bro!");
                return;
            }

            loadingUpload.classList.remove('hidden');
            generateBtnUpload.classList.add('hidden');
            resultArea.classList.add('hidden');

            const formData = new FormData();
            formData.append("file", file); // Key harus 'file' sesuai script Worker kita

            try {
                // Tembak ke endpoint /upload di Worker kamu
                const response = await fetch(`${WORKER_URL}/upload`, {
                    method: "POST",
                    body: formData
                });
                
                if (!response.ok) throw new Error('Gagal upload');

                const data = await response.json();
                
                if(data.url) {
                    renderQR(data.url);
                } else {
                    alert("Gagal dapet link dari Cloudflare!");
                }
            } catch (err) {
                alert("Gagal koneksi ke Cloudflare. Pastikan Worker sudah di-deploy.");
                console.error(err);
            } finally {
                loadingUpload.classList.add('hidden');
                generateBtnUpload.classList.remove('hidden');
            }
        };

        // Download QR as PNG
        document.getElementById('downloadBtn').onclick = () => {
            const canvas = qrcodeDiv.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'QR-Foto-LinkToQR.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        };

    </script>
</body>
</html>
