<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkToQR - Super Hybrid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <header class="bg-emerald-600 text-white py-10 shadow-lg text-center">
        <h1 class="text-3xl font-black tracking-tight">LinkToQR Pro 🔗📸</h1>
        <p class="text-emerald-100 mt-2 font-medium">Bikin Barcode: Tempel Link atau Upload Foto</p>
    </header>

    <main class="max-w-md w-full mx-auto p-6 bg-white rounded-3xl shadow-xl -mt-8 mb-10 border border-slate-100">
        
        <!-- Tab Switcher -->
        <div class="flex bg-slate-100 p-1 rounded-2xl mb-6">
            <button id="tabLink" class="flex-1 py-2 text-sm font-bold rounded-xl bg-white shadow-sm transition-all text-emerald-600">Pakai Link</button>
            <button id="tabUpload" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-emerald-600">Upload Foto</button>
        </div>

        <!-- Section 1: Pakai Link Google Drive -->
        <div id="sectionLink" class="space-y-4">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Link Google Drive</label>
                <input type="text" id="linkInput" placeholder="Paste link di sini..." 
                       class="w-full px-5 py-4 rounded-2xl border-2 border-slate-200 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/10 transition-all text-sm shadow-sm">
            </div>
            <button id="generateBtnLink" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                BUAT QR DARI LINK ⚡
            </button>
        </div>

        <!-- Section 2: Upload Foto Langsung -->
        <div id="sectionUpload" class="hidden space-y-4">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Pilih Foto dari HP</label>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <label for="fileInput" class="w-full border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-2xl py-8 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-100 transition-all group">
                    <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">🖼️</span>
                    <span id="fileName" class="text-xs font-bold text-emerald-700">Klik untuk Pilih Foto</span>
                </label>
            </div>
            <button id="generateBtnUpload" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                UPLOAD & BUAT QR 🚀
            </button>
            <div id="loadingUpload" class="hidden text-center">
                <p class="text-xs text-slate-500 animate-pulse font-bold tracking-widest">SEDANG MENGUPLOAD... SABAR YA</p>
            </div>
        </div>

        <!-- Area Hasil -->
        <div id="resultArea" class="hidden mt-8 pt-8 border-t-2 border-slate-50 space-y-6">
            <div class="flex flex-col items-center justify-center p-6 bg-slate-900 rounded-3xl">
                <div id="qrcode" class="bg-white p-4 rounded-xl shadow-inner"></div>
                <p class="text-slate-400 text-[10px] mt-4 font-black tracking-[0.2em] uppercase">Scan to View Photo</p>
            </div>
            <button id="downloadBtn" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all">
                DOWNLOAD PNG 📥
            </button>
        </div>

    </main>

    <footer class="text-slate-400 text-center py-6 text-xs mt-auto italic">
        &copy; 2026 LinkToQR - Professional Tool
    </footer>

    <script>
        const tabLink = document.getElementById('tabLink');
        const tabUpload = document.getElementById('tabUpload');
        const sectionLink = document.getElementById('sectionLink');
        const sectionUpload = document.getElementById('sectionUpload');
        
        const linkInput = document.getElementById('linkInput');
        const fileInput = document.getElementById('fileInput');
        const fileNameText = document.getElementById('fileName');
        
        const generateBtnLink = document.getElementById('generateBtnLink');
        const generateBtnUpload = document.getElementById('generateBtnUpload');
        const loadingUpload = document.getElementById('loadingUpload');
        
        const qrcodeDiv = document.getElementById('qrcode');
        const resultArea = document.getElementById('resultArea');

        // Ganti Tab
        tabLink.onclick = () => {
            tabLink.classList.add('bg-white', 'shadow-sm', 'text-emerald-600');
            tabUpload.classList.remove('bg-white', 'shadow-sm', 'text-emerald-600');
            sectionLink.classList.remove('hidden');
            sectionUpload.classList.add('hidden');
        };

        tabUpload.onclick = () => {
            tabUpload.classList.add('bg-white', 'shadow-sm', 'text-emerald-600');
            tabLink.classList.remove('bg-white', 'shadow-sm', 'text-emerald-600');
            sectionUpload.classList.remove('hidden');
            sectionLink.classList.add('hidden');
        };

        // File Selection Preview
        fileInput.onchange = () => {
            if(fileInput.files[0]) fileNameText.innerText = fileInput.files[0].name;
        };

        // Fungsi Ambil ID Drive
        function getDriveId(url) {
            const parts = url.match(/[-\w]{25,}/);
            return parts ? parts[0] : null;
        }

        // Logic QR
        function renderQR(url) {
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, {
                text: url,
                width: 260,
                height: 260,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            resultArea.classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // --- HANDLER PAKAI LINK ---
        generateBtnLink.onclick = () => {
            const fileId = getDriveId(linkInput.value);
            if(!fileId) return alert("Link Drive tidak valid!");
            
            // Pake trik thumbnail HD biar langsung muncul foto
            const directUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w4000`;
            renderQR(directUrl);
        };

        // --- HANDLER UPLOAD FOTO ---
        generateBtnUpload.onclick = async () => {
            const file = fileInput.files[0];
            if(!file) return alert("Pilih fotonya dulu, Bro!");

            loadingUpload.classList.remove('hidden');
            generateBtnUpload.classList.add('hidden');

            const formData = new FormData();
            formData.append("image", file);

            try {
                // Kita pake API ImgBB (Gratis & Cepat)
                // Ini pake Public API Key sebagai contoh
                const response = await fetch("https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    renderQR(data.data.url); // Link foto yang baru diupload
                } else {
                    alert("Gagal upload!");
                }
            } catch (err) {
                alert("Error koneksi!");
            } finally {
                loadingUpload.classList.add('hidden');
                generateBtnUpload.classList.remove('hidden');
            }
        };

        // Download PNG
        document.getElementById('downloadBtn').onclick = () => {
            const canvas = qrcodeDiv.querySelector('canvas');
            const link = document.createElement('a');
            link.download = 'Barcode_Foto.png';
            link.href = canvas.toDataURL();
            link.click();
        };

    </script>
</body>
</html>
