<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Kuota — Xtrimer Tunnel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080c10;
    --surface:  #0d1117;
    --border:   #1e2733;
    --accent:   #00e5ff;
    --accent2:  #7c3aed;
    --text:     #e2e8f0;
    --muted:    #4a5568;
    --success:  #00e5a0;
    --error:    #ff4d6d;
    --card-bg:  #0f1923;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glow blobs ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 {
    width: 500px; height: 500px;
    background: rgba(0,229,255,0.06);
    top: -200px; left: -200px;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: rgba(124,58,237,0.08);
    bottom: -150px; right: -150px;
  }

  /* ── Layout ── */
  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(8,12,16,0.7);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; }

  .logo-text {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--accent);
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.6s ease both;
  }

  .hero-label {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .hero h1 {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: #fff;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    margin-top: 14px;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.1s both;
    box-shadow: 0 0 60px rgba(0,229,255,0.04);
  }

  .card-body {
    padding: 32px;
  }

  /* ── Input group ── */
  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group label {
    display: block;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 16px; height: 16px;
    pointer-events: none;
  }

  input[type="tel"] {
    width: 100%;
    padding: 14px 14px 14px 42px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="tel"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  input[type="tel"]::placeholder { color: var(--muted); letter-spacing: 0; }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #00b8d9);
    color: #080c10;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.2);
  }

  .btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,229,255,0.3);
  }

  .btn:active:not(:disabled) { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn svg { width: 16px; height: 16px; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0;
  }

  /* ── Result area ── */
  .result-area {
    padding: 24px 32px 28px;
  }

  .result-title {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
    color: var(--muted);
  }

  .empty-state svg {
    width: 32px; height: 32px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 0.82rem;
  }

  /* Loader */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 20px 0;
  }

  .loader-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; background: rgba(0,229,255,0.6); }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; background: rgba(0,229,255,0.3); }

  /* Error state */
  .error-box {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .error-box svg {
    width: 18px; height: 18px;
    color: var(--error);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .error-box p {
    font-size: 0.84rem;
    color: var(--error);
    line-height: 1.5;
  }

  /* Nomor info bar */
  .nomor-bar {
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
  }

  .nomor-bar svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Paket cards */
  .paket-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .paket-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeUp 0.4s ease both;
  }

  .paket-card:nth-child(1) { animation-delay: 0.05s; }
  .paket-card:nth-child(2) { animation-delay: 0.10s; }
  .paket-card:nth-child(3) { animation-delay: 0.15s; }
  .paket-card:nth-child(4) { animation-delay: 0.20s; }
  .paket-card:nth-child(5) { animation-delay: 0.25s; }
  .paket-card:nth-child(n+6) { animation-delay: 0.30s; }

  .paket-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .paket-icon svg { width: 16px; height: 16px; }

  .icon-wifi   { background: rgba(0,229,255,0.1);  color: var(--accent); }
  .icon-phone  { background: rgba(0,229,160,0.1);  color: var(--success); }
  .icon-sms    { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .icon-other  { background: rgba(255,255,255,0.05); color: var(--muted); }

  .paket-info { flex: 1; min-width: 0; }

  .paket-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }

  .paket-exp {
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Empty paket */
  .no-paket {
    text-align: center;
    padding: 16px 0;
    font-size: 0.84rem;
    color: var(--muted);
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
    opacity: 0.7;
  }

  footer a:hover { opacity: 1; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    header { padding: 16px 20px; }
    .card-body { padding: 24px 20px; }
    .result-area { padding: 20px 20px 24px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="logo-text">Xtrimer <span>Tunnel</span></span>
    </a>
    <span class="badge">v1.0</span>
  </header>

  <!-- Main -->
  <main>

    <!-- Hero -->
    <div class="hero">
      <span class="hero-label">&#9679; XL &amp; AXIS Network</span>
      <h1>Cek <em>Kuota</em><br>Sekarang</h1>
      <p>Masukkan nomor XL atau AXIS untuk melihat sisa paket data.</p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-body">

        <div class="input-group">
          <label for="msisdn">Nomor Telepon</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/>
            </svg>
            <input type="tel" id="msisdn" placeholder="0878xxxxxxxx" autocomplete="off" />
          </div>
        </div>

        <button class="btn" id="btnCek">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Cek Kuota
        </button>

      </div>

      <div class="divider"></div>

      <div class="result-area">
        <div class="result-title">Detail Paket</div>
        <div id="result">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            </svg>
            <p>Hasil akan tampil di sini.</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    &copy; 2026 <a href="#">Xtrimer Tunnel</a> &mdash; All rights reserved.
  </footer>

</div>

<script>
  const btnCek  = document.getElementById('btnCek');
  const input   = document.getElementById('msisdn');
  const result  = document.getElementById('result');

  // ── Normalize nomor ──────────────────────────
  function normalizeMsisdn(val) {
    val = val.trim().replace(/[\s\-]/g, '');
    if (val.startsWith('+62')) return '0' + val.slice(3);
    if (val.startsWith('628'))  return '0' + val.slice(2);
    return val;
  }

  // ── Icon per tipe paket ──────────────────────
  function getIcon(title) {
    const t = title.toLowerCase();
    if (t.includes('internet') || t.includes('data') || t.includes('kuota') || t.includes('gb') || t.includes('mb')) {
      return { cls: 'icon-wifi', svg: '<path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1"/>' };
    }
    if (t.includes('telepon') || t.includes('nelpon') || t.includes('voice') || t.includes('menit')) {
      return { cls: 'icon-phone', svg: '<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/>' };
    }
    if (t.includes('sms')) {
      return { cls: 'icon-sms', svg: '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>' };
    }
    return { cls: 'icon-other', svg: '<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>' };
  }

  // ── Parse hasil string ───────────────────────
  function parseHasil(raw) {
    if (!raw) return [];
    return raw.split(/<br\s*\/?>/i)
      .map(l => l.replace(/<[^>]+>/g, '').trim())
      .filter(l => l.length > 0)
      .map(line => {
        let title = line, expiry = '';
        const expMatch = line.match(/^(.+?)\s*exp[:\s]+(.+)$/i);
        if (expMatch) {
          title  = expMatch[1].trim();
          expiry = 'Exp: ' + expMatch[2].trim();
        }
        return { title, expiry };
      });
  }

  // ── Render hasil ─────────────────────────────
  function renderHasil(msisdn, items) {
    const nomorBar = `
      <div class="nomor-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <path d="M12 18h.01"/>
        </svg>
        ${escHtml(msisdn)}
      </div>`;

    if (!items.length) {
      return nomorBar + '<div class="no-paket">Tidak ada paket aktif ditemukan.</div>';
    }

    const cards = items.map(item => {
      const icon = getIcon(item.title);
      return `
        <div class="paket-card">
          <div class="paket-icon ${icon.cls}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icon.svg}</svg>
          </div>
          <div class="paket-info">
            <div class="paket-name">${escHtml(item.title)}</div>
            ${item.expiry ? `<div class="paket-exp">${escHtml(item.expiry)}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    return nomorBar + `<div class="paket-list">${cards}</div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Fetch kuota ──────────────────────────────
  async function cekKuota() {
    const raw = input.value.trim();
    if (!raw) { input.focus(); return; }

    const msisdn = normalizeMsisdn(raw);

    // Loading state
    btnCek.disabled = true;
    btnCek.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite">
        <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0"/>
      </svg>
      Mengecek...`;

    result.innerHTML = `
      <div class="loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>`;

    try {
      const url = `https://apigw.kmsp-store.com/sidompul/v4/cek_kuota?msisdn=${encodeURIComponent(msisdn)}&isJSON=true`;
      const res = await fetch(url, {
        headers: {
          'Authorization': 'Basic c2lkb21wdWxhcGk6YXBpZ3drbXNw',
          'X-API-Key':      '60ef29aa-a648-4668-90ae-20951ef90c55',
          'X-App-Version':  '4.0.0',
        }
      });

      const data = await res.json();

      if (data.status === true) {
        const items = parseHasil(data?.data?.hasil || '');
        result.innerHTML = renderHasil(msisdn, items);
      } else {
        const errMsg = data?.data?.keteranganError || data?.message || 'Gagal mengambil data.';
        result.innerHTML = `
          <div class="error-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
            </svg>
            <p>${escHtml(errMsg)}</p>
          </div>`;
      }

    } catch (e) {
      result.innerHTML = `
        <div class="error-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          <p>Gagal terhubung ke server. Periksa koneksi internet kamu.</p>
        </div>`;
    }

    // Reset button
    btnCek.disabled = false;
    btnCek.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      Cek Kuota`;
  }

  // ── Events ───────────────────────────────────
  btnCek.addEventListener('click', cekKuota);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') cekKuota(); });

  // ── CSS tambahan (spin) ───────────────────────
  const style = document.createElement('style');
  style.textContent = `@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`;
  document.head.appendChild(style);
</script>
</body>
</html>
