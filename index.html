<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL to QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <header class="bg-emerald-600 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-bold">LinkToQR Generator 🔗</h1>
        <p class="text-sm text-emerald-100 mt-1">Ubah Link Google Drive / Foto Menjadi QR Code HD</p>
    </header>

    <main class="max-w-md w-full mx-auto p-6 bg-white rounded-2xl shadow-lg my-10 space-y-6">
        <div class="space-y-2">
            <label for="linkInput" class="block text-sm font-semibold text-slate-700">Paste Link Google Drive di Sini:</label>
            <input type="text" id="linkInput" placeholder="https://drive.google.com/file/d/..." class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
        </div>

        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition transform active:scale-95 cursor-pointer">
            Buat QR Code ⚡
        </button>

        <div id="qrcodeContainer" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 min-h-[200px]">
            <div id="qrcode" class="hidden bg-white p-2 rounded-lg shadow-sm"></div>
            <p id="placeholderText" class="text-slate-400 text-sm text-center">QR Code buatanmu akan muncul di sini</p>
        </div>

        <button id="downloadBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 rounded-xl text-sm hidden cursor-pointer">
            Download Gambar QR (PNG) 📥
        </button>
    </main>

    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs">
        &copy; 2026 LinkToQR. Solusi barcode foto kualitas HD.
    </footer>

    <script>
        const linkInput = document.getElementById('linkInput');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const qrcodeDiv = document.getElementById('qrcode');
        const placeholderText = document.getElementById('placeholderText');

        generateBtn.addEventListener('click', function() {
            const url = linkInput.value.trim();
            if(!url) {
                alert("Isi dulu link Google Drive-nya, bro!");
                return;
            }

            qrcodeDiv.innerHTML = "";
            qrcodeDiv.classList.remove('hidden');
            placeholderText.classList.add('hidden');

            new QRCode(qrcodeDiv, {
                text: url,
                width: 200,
                height: 200,
                colorDark : "#022c22",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            downloadBtn.classList.remove('hidden');
        });

        downloadBtn.addEventListener('click', function() {
            const qrImg = qrcodeDiv.querySelector('img');
            if (qrImg) {
                const a = document.createElement('a');
                a.href = qrImg.src;
                a.download = 'qrcode-foto-drive.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        });
    </script>
</body>
</html>
