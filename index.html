<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMAGE TO BARCODE — Instan Share</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg: #fdfcfb;
  --accent: #ff4d00;
  --dark: #121212;
  --border: #e2e2e2;
}
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; text-align: center; }

header { margin-bottom: 40px; }
.logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
.logo span { color: var(--accent); }

.card { background: #fff; border: 3px solid var(--dark); border-radius: 16px; padding: 30px; box-shadow: 8px 8px 0px var(--dark); margin-bottom: 20px; }

/* Upload Area */
.drop-zone { border: 3px dashed var(--border); border-radius: 12px; padding: 40px 20px; cursor: pointer; transition: 0.3s; background: #fafafa; position: relative; }
.drop-zone:hover { border-color: var(--accent); background: #fff8f5; }
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-zone p { font-family: 'IBM Plex Mono'; font-size: 0.8rem; color: #666; }

#preview-img { max-width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 1px solid #ddd; }

/* Progress Bar */
.progress-wrap { display: none; margin-top: 20px; }
.progress-bar { height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }

/* Result */
.result-area { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#qr-canvas { margin: 0 auto; padding: 15px; background: white; border: 1px solid #eee; border-radius: 8px; }

.btn { display: inline-block; width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; text-decoration: none; margin-top: 20px; }
.btn:hover { background: var(--accent); }
.btn-dl { background: white; color: var(--dark); border: 2px solid var(--dark); margin-top: 10px; }

.info { font-size: 0.65rem; font-family: 'IBM Plex Mono'; color: #888; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">IMG<span>2</span>BARCODE</div>
    <p style="font-size: 0.8rem; font-weight: 500; opacity: 0.7;">Ubah gambar apapun menjadi QR Code instan</p>
  </header>

  <div class="card">
    <!-- INPUT -->
    <div id="input-section">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*">
        <div id="drop-text">
          <span style="font-size: 2rem;">📸</span><br>
          <strong>Pilih atau Seret Foto</strong>
          <p>JPG, PNG, atau Screenshot</p>
        </div>
        <img id="preview-img" alt="preview">
      </div>
      
      <div class="progress-wrap" id="progress-wrap">
        <p id="status-text" style="font-size: 0.7rem; font-family: 'IBM Plex Mono'; margin-bottom: 8px;">Mengunggah gambar...</p>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <button class="btn" id="btn-upload" style="display:none;">BUAT BARCODE SEKARANG ⚡</button>
    </div>

    <!-- HASIL -->
    <div class="result-area" id="result-area">
      <p style="font-size: 0.8rem; margin-bottom: 15px; font-weight: 700;">✅ BARCODE BERHASIL DIBUAT</p>
      <div id="qr-canvas"></div>
      
      <a href="#" id="btn-download" class="btn btn-dl">Download PNG</a>
      <button onclick="location.reload()" class="btn" style="background:#eee; color:#333; margin-top:10px;">Buat Baru</button>
      
      <p class="info">
        Link Foto: <br>
        <span id="link-text" style="color:var(--accent); text-decoration: underline;"></span>
      </p>
    </div>
  </div>

  <p class="info">
    *Foto di-upload ke server file.io secara anonim.<br>
    *Foto akan otomatis terhapus dalam waktu tertentu demi keamanan.
  </p>
</div>

<script>
const fileInput = document.getElementById('file-input');
const previewImg = document.getElementById('preview-img');
const dropText = document.getElementById('drop-text');
const btnUpload = document.getElementById('btn-upload');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const resultArea = document.getElementById('result-area');
const qrCanvas = document.getElementById('qr-canvas');

let selectedFile = null;

// Handle Pilih File
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      previewImg.src = ev.target.result;
      previewImg.style.display = 'block';
      dropText.style.display = 'none';
      btnUpload.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

// Handle Upload & Generate
btnUpload.addEventListener('click', async () => {
  if (!selectedFile) return;

  // UI State
  btnUpload.style.display = 'none';
  progressWrap.style.display = 'block';
  
  // Simulasi progress bar
  let p = 0;
  const interval = setInterval(() => {
    if (p < 90) { p += 10; progressFill.style.width = p + '%'; }
  }, 200);

  // Proses Upload ke file.io (Server upload gratis & anonim)
  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const response = await fetch('https://file.io', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.success) {
      clearInterval(interval);
      progressFill.style.width = '100%';
      statusText.textContent = "Berhasil! Membuat Barcode...";

      setTimeout(() => {
        generateQR(data.link);
      }, 500);
    } else {
      throw new Error("Gagal mengunggah gambar.");
    }
  } catch (err) {
    alert("Error: " + err.message);
    location.reload();
  }
});

function generateQR(link) {
  document.getElementById('input-section').style.display = 'none';
  resultArea.style.display = 'block';
  document.getElementById('link-text').textContent = link;

  // Generate QR Code
  qrCanvas.innerHTML = ""; // Bersihkan
  new QRCode(qrCanvas, {
    text: link,
    width: 250,
    height: 250,
    colorDark : "#121212",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
  });

  // Setup Download Button
  setTimeout(() => {
    const qrImg = qrCanvas.querySelector('img');
    const dlBtn = document.getElementById('btn-download');
    dlBtn.href = qrImg.src;
    dlBtn.download = "barcode-foto.png";
  }, 500);
}
</script>

</body>
</html>
