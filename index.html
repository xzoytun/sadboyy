<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS.GEN — Professional QRIS Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* CSS tetap sama dengan sebelumnya, hanya beberapa aksen diganti */
:root {
  --bg: #f8f9fa;
  --card: #fff;
  --border: #e0e0e0;
  --dark: #121212;
  --accent: #ed1c24; /* Warna Merah QRIS */
  --accent2: #1d4076; /* Warna Biru QRIS */
  --muted: #757575;
  --text: #1a1a1a;
}
/* ... (Gunakan CSS dari file original anda) ... */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
.container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
header { padding: 28px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--dark); }
.logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; color: var(--dark); display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
.hero-title { font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 800; line-height: 1; padding: 40px 0 32px; letter-spacing: -2px; }
.red { color: var(--accent); } .blue { color: var(--accent2); }
.layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }
@media(max-width: 720px) { .layout { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 2px solid var(--dark); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
.card-head { background: var(--dark); color: #fff; padding: 10px 18px; display: flex; align-items: center; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 2px; }
.card-head .num { background: var(--accent); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
.card-body { padding: 20px; }
.drop-zone { border: 2.5px dashed var(--border); border-radius: 6px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: #fafafa; }
#preview-wrap { width: 100%; position: relative; display: none; text-align: center; padding: 10px; }
#preview-img { max-height: 150px; border-radius: 4px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; border: 2px solid var(--border); padding: 10px; font-family: 'IBM Plex Mono', monospace; border-radius: 4px; outline: none; }
.btn-gen { width: 100%; background: var(--dark); color: #fff; border: none; font-weight: 800; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
.btn-gen:hover { background: var(--accent); }
.qr-display { background: #fff; min-height: 300px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--dark); }
#qr-canvas { max-width: 100%; }
.btn-dl { display: block; text-align: center; padding: 12px; margin: 10px; border-radius: 5px; font-weight: 700; text-decoration: none; border: 2px solid var(--dark); }
.btn-dl.primary { background: var(--dark); color: #fff; }
.disabled { opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<div class="container">
  <header>
    <div class="logo"><div class="logo-dot"></div> QRIS.GEN</div>
    <div style="font-family: 'IBM Plex Mono'; font-size: 0.7rem;">OFFLINE GENERATOR</div>
  </header>

  <div class="hero-title">
    RE-DESIGN <br><span class="red">YOUR</span> <span class="blue">QRIS</span>
  </div>

  <div class="layout">
    <div>
      <!-- STEP 1: LOGO -->
      <div class="card">
        <div class="card-head"><span class="num">1</span> PASANG LOGO (TENGAH)</div>
        <div class="card-body">
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept="image/*" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
            <p style="font-size: 0.8rem; color: var(--muted);">Klik/Seret Logo Toko (PNG/JPG)</p>
          </div>
          <div id="preview-wrap">
            <img id="preview-img" alt="preview">
            <button onclick="resetImage()" style="display:block; margin: 10px auto; border:none; background:none; color:red; cursor:pointer; font-size:0.7rem;">[ GANTI LOGO ]</button>
          </div>
        </div>
      </div>

      <!-- STEP 2: DATA -->
      <div class="card">
        <div class="card-head"><span class="num">2</span> DATA QRIS</div>
        <div class="card-body">
          <div class="field">
            <label>TIPE INPUT</label>
            <select id="qr-type" onchange="updatePlaceholder()">
              <option value="qris">Data Teks QRIS (000201...)</option>
              <option value="url">URL Link Pembayaran</option>
            </select>
          </div>
          
          <div class="field" id="field-qris">
            <label>PASTE KODE QRIS DISINI</label>
            <textarea id="val-qris" rows="5" placeholder="0002010102112657000303100010113003000000..."></textarea>
          </div>

          <div class="field" id="field-url" style="display:none">
            <label>URL PEMBAYARAN</label>
            <input type="url" id="val-url" placeholder="https://link.dana.id/qr/...">
          </div>
        </div>
      </div>

      <!-- STEP 3: SETTINGS -->
      <div class="card">
        <div class="card-head"><span class="num">3</span> PENGATURAN VISUAL</div>
        <div class="card-body">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="field"><label>UKURAN QR</label><input type="number" id="qr-size" value="400"></div>
            <div class="field">
              <label>ERROR CORRECTION</label>
              <select id="qr-ecl">
                <option value="Q">Medium (Recommended)</option>
                <option value="H" selected>High (Best for Logos)</option>
              </select>
            </div>
          </div>
          <button class="btn-gen" onclick="generateQR()">⚡ BUAT QRIS SEKARANG</button>
        </div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="output-card">
      <div class="card" style="position: sticky; top: 20px;">
        <div class="card-head">HASIL QRIS</div>
        <div class="qr-display" id="qr-display">
          <canvas id="qr-canvas" style="display:none;"></canvas>
          <div id="placeholder-text" style="color:#ccc; text-align:center; font-size:0.8rem;">Hasil akan<br>muncul disini</div>
        </div>
        <div class="card-body">
          <button class="btn-dl primary disabled" id="btn-dl-png">Download PNG</button>
          <p style="font-size:0.6rem; color:var(--muted); margin-top:10px; text-align:center;">Pastikan test scan sebelum dicetak.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let imgDataURL = null;

// File Handling
const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      imgDataURL = ev.target.result;
      document.getElementById('preview-img').src = imgDataURL;
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('drop-zone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
});

function resetImage() {
  imgDataURL = null;
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'flex';
}

function updatePlaceholder() {
  const type = document.getElementById('qr-type').value;
  document.getElementById('field-qris').style.display = type === 'qris' ? 'block' : 'none';
  document.getElementById('field-url').style.display = type === 'url' ? 'block' : 'none';
}

function generateQR() {
  const type = document.getElementById('qr-type').value;
  let qrText = "";
  
  if(type === 'qris') {
    qrText = document.getElementById('val-qris').value.trim();
  } else {
    qrText = document.getElementById('val-url').value.trim();
  }

  if(!qrText) return alert("Mohon isi data QRIS terlebih dahulu!");

  const size = parseInt(document.getElementById('qr-size').value) || 400;
  const ecl = document.getElementById('qr-ecl').value;
  const canvas = document.getElementById('qr-canvas');
  
  document.getElementById('placeholder-text').style.display = 'none';
  canvas.style.display = 'block';

  // Temporary div for qrcode.js
  const tmpDiv = document.createElement('div');
  new QRCode(tmpDiv, {
    text: qrText,
    width: size,
    height: size,
    correctLevel: QRCode.CorrectLevel[ecl]
  });

  setTimeout(() => {
    const tmpCanvas = tmpDiv.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = size;
    canvas.height = size;
    ctx.drawImage(tmpCanvas, 0, 0, size, size);

    if (imgDataURL) {
      const logoImg = new Image();
      logoImg.onload = () => {
        const logoSize = size * 0.22; // Ukuran logo 22% dari QR
        const x = (size - logoSize) / 2;
        const y = (size - logoSize) / 2;
        
        // Background putih logo agar tidak tabrakan dengan pattern QR
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(x - 5, y - 5, logoSize + 10, logoSize + 10);
        
        ctx.drawImage(logoImg, x, y, logoSize, logoSize);
        enableDownload();
      };
      logoImg.src = imgDataURL;
    } else {
      enableDownload();
    }
  }, 100);
}

function enableDownload() {
  const btn = document.getElementById('btn-dl-png');
  btn.classList.remove('disabled');
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = 'My-QRIS.png';
    link.href = document.getElementById('qr-canvas').toDataURL();
    link.click();
  };
}
</script>
</body>
</html>
