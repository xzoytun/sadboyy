<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkToQR - Direct Photo HD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Animasi dikit biar keren */
        #qrcode img {
            border-radius: 12px;
            border: 4px solid white;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col">

    <header class="bg-emerald-600 text-white py-10 shadow-lg text-center">
        <h1 class="text-4xl font-black tracking-tight">LinkToQR HD 📸</h1>
        <p class="text-emerald-100 mt-2 font-medium">Scan Langsung Muncul Foto Full Screen</p>
    </header>

    <main class="max-w-md w-full mx-auto p-6 bg-white rounded-3xl shadow-2xl -mt-8 mb-10 space-y-6">
        <div class="space-y-3">
            <label for="linkInput" class="block text-sm font-bold text-slate-700 ml-1">Paste Link Google Drive Kamu:</label>
            <input type="text" id="linkInput" placeholder="https://drive.google.com/file/d/..." 
                   class="w-full px-5 py-4 rounded-2xl border-2 border-slate-200 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-100 transition-all text-sm shadow-sm">
            <div class="flex items-center gap-2 px-1">
                <span class="flex h-2 w-2 rounded-full bg-amber-500"></span>
                <p class="text-[11px] text-slate-500 font-medium">Pastikan akses link sudah "Siapa saja yang memiliki link"</p>
            </div>
        </div>

        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-200 transition transform active:scale-95 cursor-pointer flex items-center justify-center gap-3 text-lg">
            BUAT BARCODE FOTO ⚡
        </button>

        <!-- Area Hasil QR -->
        <div id="resultArea" class="hidden space-y-6 pt-4 border-t border-slate-100">
            <div id="qrcodeContainer" class="flex flex-col items-center justify-center p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
                <div id="qrcode"></div>
                <p class="text-slate-400 text-[10px] mt-4 uppercase tracking-widest font-bold">QR Code Ready to Scan</p>
            </div>

            <button id="downloadBtn" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-xl">
                DOWNLOAD BARCODE (PNG) 📥
            </button>
            
            <p class="text-center text-xs text-slate-400 italic">Tips: Coba scan sekarang untuk tes hasilnya!</p>
        </div>
    </main>

    <footer class="text-slate-400 text-center py-6 text-xs mt-auto">
        &copy; 2026 <strong>LinkToQR</strong> - Direct Image System.
    </footer>

    <script>
        const linkInput = document.getElementById('linkInput');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultArea = document.getElementById('resultArea');
        const qrcodeDiv = document.getElementById('qrcode');

        // Fungsi ambil ID File yang lebih kuat (Support semua jenis link Drive)
        function getDriveId(url) {
            const parts = url.match(/[-\w]{25,}/);
            return parts ? parts[0] : null;
        }

        generateBtn.addEventListener('click', function() {
            const url = linkInput.value.trim();
            const fileId = getDriveId(url);

            if (!fileId) {
                alert("Waduh bro, linknya salah tuh. Pastiin ambil link dari Google Drive ya!");
                return;
            }

            // LINK SAKTI: Menggunakan endpoint thumbnail dengan ukuran maksimal (sz=w4000)
            // Ini akan membuat browser nampilin gambar aja, tanpa UI Google Drive.
            const directLink = `https://drive.google.com/thumbnail?id=${fileId}&sz=w4000`;

            // Bersihkan QR lama
            qrcodeDiv.innerHTML = "";
            resultArea.classList.remove('hidden');

            // Bikin QR Baru
            new QRCode(qrcodeDiv, {
                text: directLink,
                width: 280,
                height: 280,
                colorDark : "#064e3b", // Hijau gelap biar elegan
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H // High quality agar gampang di scan
            });

            // Scroll ke bawah biar kelihatan hasilnya
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        // Fungsi Download Gambar
        downloadBtn.addEventListener('click', function() {
            const qrCanvas = qrcodeDiv.querySelector('canvas');
            if (qrCanvas) {
                const image = qrCanvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = 'QR_Foto_Direct.png';
                link.click();
            }
        });
    </script>
</body>
</html>
