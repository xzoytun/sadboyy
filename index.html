<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Zoy Digital</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; padding: 40px; width: 100%; max-width: 400px; }
        .btn-primary { border-radius: 50px; padding: 10px; }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="card login-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">ZOY DIGITAL</h3>
                <p class="text-muted">Masuk ke akun Anda</p>
            </div>
            
            <form>
                <div class="mb-3">
                    <label class="form-label">Email atau Username</label>
                    <input type="text" class="form-control" placeholder="Masukkan username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <div class="text-center">
                    <small>Belum punya akun? <a href="#" class="text-primary text-decoration-none fw-bold">Daftar</a></small>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
