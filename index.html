<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Random Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body {
            background-color: #0b0e14;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .status-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff00ff; /* Warna pink neon mirip ss kamu */
        }
        .btn {
            background-color: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:disabled { background-color: #555; }
    </style>
</head>
<body>

    <div class="status-text" id="status">Menghubungkan ke server...</div>
    <button class="btn" id="actionBtn" onclick="startSearch()" disabled>Cari Teman Ngobrol</button>

    <script src="script.js"></script>
</body>
</html>
