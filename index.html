<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image/Text to Barcode Generator</title>
    <!-- Tailwind CSS untuk Styling Modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- JsBarcode Library untuk Generate Barcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- Tesseract.js untuk Membaca Teks dari Gambar (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-bold tracking-wide">PicToBarcode 🚀</h1>
        <p class="text-sm text-blue-100 mt-1">Ubah Gambar atau Teks Menjadi Barcode dengan Mudah</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl w-full mx-auto p-4 flex-grow grid md:grid-cols-2 gap-6 items-start my-6">
        
        <!-- Kiri: Input Area -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-6">
            <h2 class="text-xl font-semibold text-slate-700 border-b pb-2">1. Input Data</h2>
            
            <!-- Upload Gambar -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-600">Upload Foto/Gambar (Ekstrak Teks):</label>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="text-xs text-slate-500"><span class="font-semibold">Klik untuk upload</span> atau drag and drop</p>
                            <p class="text-xs text-slate-400 mt-1">PNG, JPG, JPEG</p>
                        </div>
                        <input id="imageInput" type="file" accept="image/*" class="hidden" />
                    </label>
                </div>
                <!-- Indikator Loading OCR -->
                <div id="ocrStatus" class="text-xs text-blue-600 font-medium hidden animate-pulse">Sedang membaca teks dari gambar... Membutuhkan waktu beberapa detik.</div>
            </div>

            <!-- Separator -->
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-4 text-slate-400 text-xs uppercase font-bold">Atau isi manual</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <!-- Input Teks -->
            <div class="space-y-2">
                <label for="textInput" class="block text-sm font-medium text-slate-600">Teks / Kode Barcode:</label>
                <input type="text" id="textInput" placeholder="Contoh: KODE123456" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-base">
            </div>

            <!-- Tombol Generate -->
            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition transform active:scale-95 cursor-pointer">
                Generate Barcode ⚡
            </button>
        </section>

        <!-- Kanan: Output Area -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center min-h-[350px] text-center space-y-6">
            <h2 class="text-xl font-semibold text-slate-700 border-b pb-2 w-full text-left">2. Hasil Barcode</h2>
            
            <!-- Tempat Barcode Muncul -->
            <div id="barcodeContainer" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl border border-slate-200 w-full min-h-[180px]">
                <p id="placeholderText" class="text-slate-400 text-sm">Barcode Anda akan muncul di sini</p>
                <svg id="barcode" class="hidden max-w-full"></svg>
            </div>

            <!-- Tombol Download -->
            <button id="downloadBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition transform active:scale-95 hidden cursor-pointer">
                Download Barcode (PNG) 📥
            </button>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs border-t border-slate-700">
        &copy; 2026 PicToBarcode. Dibuat dengan menggunakan JsBarcode & Tesseract.js.
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const imageInput = document.getElementById('imageInput');
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const barcodeSvg = document.getElementById('barcode');
        const placeholderText = document.getElementById('placeholderText');
        const ocrStatus = document.getElementById('ocrStatus');

        // 1. Logika untuk Membaca Teks dari Gambar (OCR)
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            ocrStatus.classList.remove('hidden');
            textInput.value = "Mengekstrak...";

            Tesseract.recognize(
                file,
                'eng', // Menggunakan bahasa inggris/angka standard
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                ocrStatus.classList.add('hidden');
                // Membersihkan spasi berlebih atau baris baru agar aman jadi barcode
                const cleanText = text.trim().replace(/\s+/g, ' ');
                if (cleanText) {
                    textInput.value = cleanText;
                } else {
                    alert("Teks tidak terdeteksi di gambar. Coba ketik manual.");
                    textInput.value = "";
                }
            }).catch(err => {
                console.error(err);
                ocrStatus.classList.add('hidden');
                alert("Gagal membaca gambar. Silakan masukkan teks secara manual.");
                textInput.value = "";
            });
        });

        // 2. Logika untuk Generate Barcode
        generateBtn.addEventListener('click', function() {
            const value = textInput.value.trim();

            if (!value || value === "Mengekstrak...") {
                alert("Silakan masukkan teks atau upload gambar terlebih dahulu!");
                return;
            }

            try {
                // Tampilkan SVG barcode, sembunyikan placeholder
                barcodeSvg.classList.remove('hidden');
                placeholderText.classList.add('hidden');

                // Generate menggunakan standard CODE128 (bisa huruf + angka)
                JsBarcode("#barcode", value, {
                    format: "CODE128",
                    lineColor: "#0f172a", // warna Slate 900
                    width: 2,
                    height: 80,
                    displayValue: true // Menampilkan teks di bawah barcode
                });

                // Tampilkan tombol download setelah berhasil generate
                downloadBtn.classList.remove('hidden');
            } catch (error) {
                alert("Gagal membuat barcode. Pastikan karakter didukung oleh standar CODE128.");
                console.error(error);
            }
        });

        // 3. Logika untuk Download Barcode sebagai PNG
        downloadBtn.addEventListener('click', function() {
            const svg = document.getElementById('barcode');
            const svgString = new XMLSerializer().serializeToString(svg);
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function() {
                // Beri sedikit padding pada canvas agar tidak terlalu mepet
                canvas.width = img.width + 40;
                canvas.height = img.height + 40;
                
                // Set background putih
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Gambar barcode ke canvas
                ctx.drawImage(img, 20, 20);
                
                // Trigger download PNG
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = `barcode-${textInput.value.trim()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };

            img.src = URL.createObjectURL(svgBlob);
        });
    </script>
</body>
</html>
