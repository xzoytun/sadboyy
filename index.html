<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtrimer Tunnel — Cek Kuota Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712;
    --card: #111827;
    --card-hover: #1f2937;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #00f2ff;
    --accent-glow: rgba(0, 242, 255, 0.3);
    --secondary: #8b5cf6;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --success: #10b981;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    background-image: 
      radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
  }

  /* --- Navbar --- */
  nav {
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(3, 7, 18, 0.8);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.5px;
    text-decoration: none;
    color: white;
  }

  .logo span { color: var(--accent); }

  .logo-box {
    background: linear-gradient(135deg, var(--accent), var(--secondary));
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: grid;
    place-items: center;
  }

  /* --- Container --- */
  .container {
    max-width: 500px;
    margin: 60px auto;
    padding: 0 20px;
    width: 100%;
  }

  .hero-section {
    text-align: center;
    margin-bottom: 40px;
  }

  .hero-section h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(to right, #fff, #9ca3af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-section p {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  /* --- Card UI --- */
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
  }

  .input-group {
    margin-bottom: 24px;
  }

  .input-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-left: 4px;
  }

  .input-wrapper {
    position: relative;
  }

  input[type="tel"] {
    width: 100%;
    background: #030712;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 16px 16px 48px;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  input[type="tel"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .input-wrapper svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .btn-primary {
    width: 100%;
    background: white;
    color: black;
    border: none;
    padding: 16px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
    background: var(--accent);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* --- Results Section --- */
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 40px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .result-header h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  #msisdn-display {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
  }

  .paket-item {
    background: var(--card-hover);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: slideUp 0.4s ease forwards;
  }

  .paket-icon {
    width: 48px;
    height: 48px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .paket-content {
    flex: 1;
  }

  .paket-name {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    display: block;
  }

  .paket-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    display: block;
  }

  .paket-expiry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--secondary);
    margin-top: 6px;
    display: block;
    background: rgba(139, 92, 246, 0.1);
    width: fit-content;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* --- Loader --- */
  .loader {
    text-align: center;
    padding: 40px 0;
  }
  
  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 242, 255, 0.1);
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  /* --- Error Box --- */
  .error-box {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.2);
    padding: 16px;
    border-radius: 12px;
    color: var(--error);
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
  }

  /* --- Animations --- */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  footer {
    margin-top: auto;
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    XTRIMER <span>TUNNEL</span>
  </a>
  <div style="font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--text-muted);">STATUS: ONLINE</div>
</nav>

<div class="container">
  <div class="hero-section">
    <h1>Cek Kuota</h1>
    <p>Pantau sisa data XL & AXIS kamu dengan akurat.</p>
  </div>

  <div class="main-card">
    <div class="input-group">
      <label>Nomor XL / AXIS</label>
      <div class="input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        <input type="tel" id="msisdn" placeholder="Contoh: 08781234xxxx" maxlength="15">
      </div>
    </div>

    <button id="btnCek" class="btn-primary">
      <span>Periksa Kuota</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div id="result-container" style="display: none;">
      <div class="result-header">
        <h3>Detail Paket Aktif</h3>
        <span id="msisdn-display"></span>
      </div>
      <div id="paket-list"></div>
    </div>
  </div>
</div>

<footer>
  &copy; 2026 XTRIMER TUNNEL ENGINE • v4.0.0
</footer>

<script>
  const btnCek = document.getElementById('btnCek');
  const inputPhone = document.getElementById('msisdn');
  const resultContainer = document.getElementById('result-container');
  const paketList = document.getElementById('paket-list');
  const msisdnDisplay = document.getElementById('msisdn-display');

  // Utility: Membersihkan nomor
  function formatNomor(num) {
    num = num.replace(/[^0-9]/g, '');
    if (num.startsWith('62')) return '0' + num.slice(2);
    return num;
  }

  // Utility: Icon Pintar berdasarkan kategori
  function getSmartIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('youtube') || n.includes('video')) return '🎬';
    if (n.includes('sosmed') || n.includes('ig') || n.includes('facebook')) return '📱';
    if (n.includes('malam') || n.includes('night')) return '🌙';
    if (n.includes('game')) return '🎮';
    if (n.includes('chat') || n.includes('wa')) return '💬';
    return '🚀';
  }

  // Core Function: Parsing string data menjadi objek rapi
  function parseData(rawHtml) {
    if (!rawHtml) return [];
    
    // Pecah berdasarkan <br>
    return rawHtml.split(/<br\s*\/?>/i)
      .map(line => line.replace(/<[^>]+>/g, '').trim())
      .filter(line => line.length > 5)
      .map(line => {
        // Mencari sisa kuota (biasanya angka diikuti GB/MB/Menit)
        const quotaMatch = line.match(/(\d+(\.\d+)?\s*(GB|MB|KB|Menit|SMS))/i);
        const expMatch = line.match(/exp\s*(.*)$/i);
        
        let quotaValue = quotaMatch ? quotaMatch[0] : "Aktif";
        let cleanName = line.replace(quotaValue, '').replace(/exp.*$/i, '').replace(/^-\s*/, '').trim();
        let expiry = expMatch ? expMatch[1].trim() : "Selamanya";

        return {
          name: cleanName || "Paket Data",
          value: quotaValue,
          expiry: expiry
        };
      });
  }

  async function cekKuota() {
    const rawNum = inputPhone.value;
    if (rawNum.length < 9) return alert('Nomor tidak valid!');

    const msisdn = formatNomor(rawNum);
    
    // UI Loading State
    btnCek.disabled = true;
    btnCek.innerHTML = '<div class="spinner"></div>';
    resultContainer.style.display = 'block';
    msisdnDisplay.textContent = msisdn;
    paketList.innerHTML = '<div class="loader"><div class="spinner"></div><p style="color:var(--text-muted)">Menghubungkan ke API Sidompul...</p></div>';

    try {
      const response = await fetch(`https://apigw.kmsp-store.com/sidompul/v4/cek_kuota?msisdn=${msisdn}&isJSON=true`, {
        headers: {
          'Authorization': 'Basic c2lkb21wdWxhcGk6YXBpZ3drbXNw',
          'X-API-Key': '60ef29aa-a648-4668-90ae-20951ef90c55',
          'X-App-Version': '4.0.0'
        }
      });

      const resData = await response.json();

      if (resData.status === true) {
        const items = parseData(resData.data.hasil);
        
        if (items.length === 0) {
          paketList.innerHTML = '<p class="error-box">Tidak ada paket aktif ditemukan pada nomor ini.</p>';
        } else {
          paketList.innerHTML = items.map((item, index) => `
            <div class="paket-item" style="animation-delay: ${index * 0.1}s">
              <div class="paket-icon">${getSmartIcon(item.name)}</div>
              <div class="paket-content">
                <span class="paket-name">${item.name}</span>
                <span class="paket-value">${item.value}</span>
                <span class="paket-expiry">⏱ Exp: ${item.expiry}</span>
              </div>
            </div>
          `).join('');
        }
      } else {
        throw new Error(resData.data.keteranganError || 'Gagal mengambil data');
      }

    } catch (err) {
      paketList.innerHTML = `
        <div class="error-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ${err.message}
        </div>`;
    } finally {
      btnCek.disabled = false;
      btnCek.innerHTML = '<span>Periksa Kuota</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    }
  }

  btnCek.addEventListener('click', cekKuota);
  inputPhone.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') cekKuota();
  });
</script>
</body>
</html>
