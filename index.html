<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Nabila 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --rose: #ff6b9d;
            --deep-rose: #c84b77;
            --blush: #ffb3d0;
            --gold: #ffd700;
            --soft-gold: #ffe066;
            --lavender: #c9a0dc;
            --cream: #fff5f8;
        }

        body {
            background: #060010;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            cursor: none;
        }

        /* ===== CUSTOM CURSOR ===== */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            font-size: 16px;
            transition: transform 0.1s;
        }

        /* ===== CANVAS BACKGROUND ===== */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* ===== NEBULA LAYERS ===== */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            animation: nebulaPulse 8s ease-in-out infinite alternate;
        }
        .nebula-1 { width: 600px; height: 600px; background: radial-gradient(circle, #ff1a6e, transparent 70%); top: -150px; left: -100px; animation-delay: 0s; }
        .nebula-2 { width: 500px; height: 500px; background: radial-gradient(circle, #c44bff, transparent 70%); bottom: -100px; right: -80px; animation-delay: 2s; }
        .nebula-3 { width: 400px; height: 400px; background: radial-gradient(circle, #ff6b9d, transparent 70%); top: 40%; left: 60%; animation-delay: 4s; }
        .nebula-4 { width: 350px; height: 350px; background: radial-gradient(circle, #6b5bff, transparent 70%); top: 30%; left: -50px; animation-delay: 1s; }

        @keyframes nebulaPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.15; }
            100% { transform: scale(1.2) rotate(15deg); opacity: 0.25; }
        }

        /* ===== FLOATING HEARTS ===== */
        .heart-float {
            position: fixed;
            pointer-events: none;
            animation: heartRise linear infinite;
            z-index: 2;
            opacity: 0;
        }
        .heart-float::before {
            content: '♥';
            display: block;
            color: var(--rose);
            text-shadow: 0 0 10px var(--rose), 0 0 20px var(--rose);
        }

        @keyframes heartRise {
            0% { transform: translateY(110vh) scale(0.5) rotate(-10deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1) rotate(10deg); opacity: 0; }
        }

        /* ===== SPARKLES ===== */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            animation: sparkleAnim ease-in-out infinite;
        }
        .sparkle::before {
            content: '✦';
            display: block;
            color: var(--soft-gold);
            text-shadow: 0 0 8px var(--gold), 0 0 16px var(--gold);
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }

        /* ===== PETAL RAIN ===== */
        .petal {
            position: fixed;
            top: -30px;
            pointer-events: none;
            z-index: 2;
            animation: petalFall linear infinite;
            opacity: 0;
        }
        .petal::before {
            content: '🌸';
            display: block;
            font-size: 14px;
            filter: hue-rotate(var(--hue, 0deg));
        }

        @keyframes petalFall {
            0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% { transform: translateY(105vh) rotate(720deg) translateX(var(--drift, 60px)); opacity: 0; }
        }

        /* ===== MAIN CARD ===== */
        #card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px 60px 55px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 107, 157, 0.25);
            border-radius: 30px;
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 0 1px rgba(255, 107, 157, 0.1),
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(255, 107, 157, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            max-width: 680px;
            width: 90vw;
            animation: cardFloat 6s ease-in-out infinite alternate;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px) rotate(-0.3deg); }
            100% { transform: translateY(-14px) rotate(0.3deg); }
        }

        /* ===== DECORATIVE LINE TOP ===== */
        .deco-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .deco-line span {
            color: var(--rose);
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }
        .deco-line::before, .deco-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,107,157,0.4), transparent);
        }

        /* ===== MAIN TITLE ===== */
        #title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(52px, 10vw, 88px);
            line-height: 1.1;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffd700 35%, #ff6b9d 65%, #c9a0dc 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 5s ease infinite, titleEntrance 1.2s ease-out both;
            text-shadow: none;
            margin: 10px 0 4px;
            position: relative;
        }

        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes titleEntrance {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== HEART DIVIDER ===== */
        .heart-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 14px 0;
        }
        .heart-divider .h-dot {
            width: 4px; height: 4px;
            background: rgba(255, 107, 157, 0.5);
            border-radius: 50%;
        }
        .heart-divider .h-center {
            font-size: 24px;
            animation: heartBeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(255, 107, 157, 0.9));
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.2); }
            70% { transform: scale(1); }
        }

        /* ===== SUBTITLE (NABILA) ===== */
        #subtitle {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(38px, 7vw, 62px);
            color: var(--blush);
            text-shadow:
                0 0 20px rgba(255, 179, 208, 0.6),
                0 0 40px rgba(255, 107, 157, 0.3);
            animation: subtitleGlow 3s ease-in-out infinite alternate, titleEntrance 1.5s ease-out 0.3s both;
            letter-spacing: 2px;
        }

        @keyframes subtitleGlow {
            0% { text-shadow: 0 0 20px rgba(255, 179, 208, 0.5), 0 0 40px rgba(255, 107, 157, 0.2); }
            100% { text-shadow: 0 0 30px rgba(255, 179, 208, 0.9), 0 0 60px rgba(255, 107, 157, 0.6), 0 0 80px rgba(255, 107, 157, 0.2); }
        }

        /* ===== POEM ===== */
        #poem {
            margin-top: 22px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(13px, 2.2vw, 16px);
            color: rgba(255, 220, 235, 0.65);
            line-height: 1.9;
            letter-spacing: 0.5px;
            animation: titleEntrance 1.8s ease-out 0.6s both;
        }

        /* ===== BOTTOM DECO ===== */
        .bottom-deco {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .bottom-deco .mini-heart {
            color: var(--rose);
            font-size: 14px;
            animation: heartBeat 1.5s ease-in-out infinite;
        }
        .bottom-deco .mini-heart:nth-child(1) { animation-delay: 0s; font-size: 10px; opacity: 0.5; }
        .bottom-deco .mini-heart:nth-child(2) { animation-delay: 0.15s; font-size: 16px; }
        .bottom-deco .mini-heart:nth-child(3) { animation-delay: 0.3s; font-size: 12px; opacity: 0.7; }
        .bottom-deco .mini-heart:nth-child(4) { animation-delay: 0.45s; font-size: 18px; }
        .bottom-deco .mini-heart:nth-child(5) { animation-delay: 0.6s; font-size: 12px; opacity: 0.7; }
        .bottom-deco .mini-heart:nth-child(6) { animation-delay: 0.75s; font-size: 16px; }
        .bottom-deco .mini-heart:nth-child(7) { animation-delay: 0.9s; font-size: 10px; opacity: 0.5; }

        /* ===== STARS CANVAS ===== */
        #stars-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== MOON ===== */
        #moon {
            position: fixed;
            width: 100px;
            height: 100px;
            top: 8vh;
            right: 10vw;
            background: radial-gradient(circle at 35% 35%, #fff8f0, #e8d5c0, #c4a882);
            border-radius: 50%;
            box-shadow:
                0 0 30px rgba(255, 220, 180, 0.4),
                0 0 60px rgba(255, 200, 150, 0.2),
                inset -15px -10px 25px rgba(100, 70, 40, 0.3);
            z-index: 4;
            animation: moonFloat 8s ease-in-out infinite alternate;
        }
        .moon-crater {
            position: absolute;
            background: rgba(150, 100, 60, 0.2);
            border-radius: 50%;
        }
        .mc1 { width: 18px; height: 18px; top: 25px; left: 30px; }
        .mc2 { width: 10px; height: 10px; top: 50px; left: 55px; }
        .mc3 { width: 14px; height: 14px; top: 15px; left: 60px; }

        @keyframes moonFloat {
            0% { transform: translateY(0) rotate(-3deg); box-shadow: 0 0 30px rgba(255,220,180,0.3), 0 0 60px rgba(255,200,150,0.15), inset -15px -10px 25px rgba(100,70,40,0.3); }
            100% { transform: translateY(-20px) rotate(3deg); box-shadow: 0 0 50px rgba(255,220,180,0.5), 0 0 90px rgba(255,200,150,0.3), inset -15px -10px 25px rgba(100,70,40,0.3); }
        }

        /* ===== CLICK BURST ===== */
        .click-burst {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            font-size: 20px;
            animation: burstOut 0.8s ease-out forwards;
        }
        @keyframes burstOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, calc(-50% - 60px)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Cursor -->
    <div id="cursor">💕</div>

    <!-- Nebulas -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div class="nebula nebula-4"></div>

    <!-- Stars Canvas -->
    <canvas id="stars-canvas"></canvas>

    <!-- Moon -->
    <div id="moon">
        <div class="moon-crater mc1"></div>
        <div class="moon-crater mc2"></div>
        <div class="moon-crater mc3"></div>
    </div>

    <!-- Main Card -->
    <div id="card">
        <div class="deco-line">
            <span>✦ untuk seorang yang istimewa ✦</span>
        </div>

        <div id="title">I Love You</div>

        <div class="heart-divider">
            <div class="h-dot"></div>
            <div class="h-dot"></div>
            <span class="h-center">💖</span>
            <div class="h-dot"></div>
            <div class="h-dot"></div>
        </div>

        <div id="subtitle">Nabila</div>

        <p id="poem">
            Di antara bintang-bintang yang berkelip indah,<br>
            hanya namamu yang selalu bersinar di hati.<br>
            Setiap detak adalah untukmu,<br>
            kamu adalah galaksiku yang paling sempurna.
        </p>

        <div class="bottom-deco">
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
            <span class="mini-heart">♥</span>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // ===== CURSOR =====
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // ===== STAR CANVAS =====
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.8 + 0.2,
                alpha: Math.random(),
                speed: Math.random() * 0.008 + 0.003,
                phase: Math.random() * Math.PI * 2,
                color: Math.random() < 0.3 ? '#ffd0e8' : Math.random() < 0.5 ? '#ffe066' : '#ffffff'
            });
        }

        function drawStars(ts) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.phase + ts * s.speed));
                ctx.save();
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = s.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            requestAnimationFrame(drawStars);
        }
        requestAnimationFrame(drawStars);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ===== FLOATING HEARTS =====
        const heartSymbols = ['♥', '❤', '💕', '💗', '💓', '💞', '💖'];
        const heartSizes = [10, 13, 16, 20, 24, 28];
        function spawnHeart() {
            const el = document.createElement('div');
            el.className = 'heart-float';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.bottom = '-30px';
            const size = heartSizes[Math.floor(Math.random() * heartSizes.length)];
            el.style.fontSize = size + 'px';
            const dur = Math.random() * 10 + 12;
            const delay = Math.random() * 3;
            const colors = ['#ff6b9d','#ff9bc2','#ffd0e8','#c84b77','#ffb3d0','#ff1a6e'];
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.filter = `drop-shadow(0 0 8px ${el.style.color})`;
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = delay + 's';
            el.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            document.body.appendChild(el);
            setTimeout(() => el.remove(), (dur + delay + 1) * 1000);
        }
        setInterval(spawnHeart, 1200);
        for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 400);

        // ===== SPARKLES =====
        function spawnSparkle() {
            const el = document.createElement('div');
            el.className = 'sparkle';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            const size = Math.random() * 14 + 8;
            el.style.fontSize = size + 'px';
            const dur = Math.random() * 3 + 2;
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = (Math.random() * 2) + 's';
            const sparkSyms = ['✦','✧','✩','★','✺','✿'];
            el.textContent = sparkSyms[Math.floor(Math.random() * sparkSyms.length)];
            const goldens = ['#ffd700','#ffe066','#ffc0cb','#ff9bc2','#fff0a0'];
            el.style.color = goldens[Math.floor(Math.random() * goldens.length)];
            el.style.textShadow = `0 0 8px ${el.style.color}, 0 0 16px ${el.style.color}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), (dur + 2 + 1) * 1000);
        }
        setInterval(spawnSparkle, 600);
        for (let i = 0; i < 20; i++) setTimeout(spawnSparkle, i * 200);

        // ===== PETAL RAIN =====
        function spawnPetal() {
            const el = document.createElement('div');
            el.className = 'petal';
            el.style.left = Math.random() * 110 + 'vw';
            const dur = Math.random() * 10 + 12;
            el.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
            el.style.setProperty('--hue', (Math.random() * 60 - 30) + 'deg');
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.fontSize = (Math.random() * 10 + 10) + 'px';
            const petals = ['🌸','🌹','🌺','💐','🌷'];
            el.textContent = petals[Math.floor(Math.random() * petals.length)];
            document.body.appendChild(el);
            setTimeout(() => el.remove(), (dur + 6) * 1000);
        }
        setInterval(spawnPetal, 1800);
        for (let i = 0; i < 6; i++) setTimeout(spawnPetal, i * 600);

        // ===== CLICK BURST =====
        const burstSyms = ['💕','💖','💗','❤️','✨','💫','💝','🌸'];
        document.addEventListener('click', e => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'click-burst';
                    el.style.left = (e.clientX + (Math.random() * 60 - 30)) + 'px';
                    el.style.top = (e.clientY + (Math.random() * 60 - 30)) + 'px';
                    el.textContent = burstSyms[Math.floor(Math.random() * burstSyms.length)];
                    el.style.animationDuration = (Math.random() * 0.4 + 0.6) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1000);
                }, i * 80);
            }
        });

    });
    </script>
</body>
</html>
