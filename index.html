<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtrimer Pay System</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #182533; /* Warna dark mode Telegram */
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    /* Baris tombol Kurangi, Angka, Tambah */
    .row-qty {
      display: flex;
      gap: 5px;
    }
    .btn-blue {
      flex: 1;
      background-color: #2481cc; /* Biru Solid */
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .qty-display {
      flex: 1;
      background-color: #2b394a;
      color: white;
      border: none;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
    }

    /* Tombol Bayar Saldo (Hijau Solid) */
    .btn-green {
      width: 100%;
      background-color: #31b54a; /* Hijau Solid */
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    /* Tombol Kembali (Merah Solid) */
    .btn-red {
      width: 100%;
      background-color: #e53935; /* Merah Solid */
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="row-qty">
    <button class="btn-blue" onclick="changeQty(-1)">- Kurangi</button>
    <div class="qty-display" id="qty">1</div>
    <button class="btn-blue" onclick="changeQty(1)">Tambah +</button>
  </div>

  <button class="btn-green" onclick="prosesBayar()">Bayar Saldo</button>
  <button class="btn-red" onclick="tutupApp()">Kembali</button>

  <script>
    // Inisialisasi Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Biar langsung kebuka full screen layarnya

    let currentQty = 1;

    function changeQty(amount) {
      if (currentQty + amount >= 1) {
        currentQty += amount;
        document.getElementById('qty').innerText = currentQty;
      }
    }

    function prosesBayar() {
      // Kirim data kembali ke bot Node.js lo saat tombol hijau diklik
      tg.sendData(JSON.stringify({ action: 'bayar', qty: currentQty }));
      tg.close();
    }

    function tutupApp() {
      tg.close();
    }
  </script>
</body>
</html>
