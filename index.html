<!DOCTYPE html>
<html lang="id">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .hero { background: linear-gradient(135deg, #0d6efd, #0099ff); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .card-service { transition: 0.3s; cursor: pointer; }
        .card-service:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Zoy Digital</a>
        <div class="d-flex">
            <span class="text-white me-3"><i class="bi bi-wallet2"></i> Rp 150.000</span>
            <button class="btn btn-outline-light btn-sm">Profil</button>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero text-center">
    <h2 class="fw-bold">Selamat Datang di Zoy Digital</h2>
    <p>Solusi VPN Cepat & PPOB Terpercaya</p>
</div>

<!-- Main Content -->
<div class="container mt-4">
    <div class="row g-4">
        <!-- Card PPOB -->
        <div class="col-6 col-md-3">
            <div class="card card-service p-3 text-center border-0 shadow-sm">
                <i class="bi bi-phone fs-1 text-primary"></i>
                <h6 class="mt-2">Pulsa/Data</h6>
            </div>
        </div>
        <!-- Card VPN -->
        <div class="col-6 col-md-3">
            <div class="card card-service p-3 text-center border-0 shadow-sm">
                <i class="bi bi-shield-lock fs-1 text-success"></i>
                <h6 class="mt-2">VPN Premium</h6>
            </div>
        </div>
    </div>

    <!-- Riwayat -->
    <div class="mt-5">
        <h5 class="fw-bold">Transaksi Terakhir</h5>
        <div class="card shadow-sm border-0">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between">
                    <span>Pulsa Indosat 25k</span>
                    <span class="badge bg-success">Berhasil</span>
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
