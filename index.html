<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtrimer Tunnel — Cek Kuota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --accent: #3b82f6;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --success: #10b981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--text-dark);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image: 
      radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%),
      radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
  }

  /* --- Navbar --- */
  nav {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--primary);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--primary);
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: white;
  }

  /* --- Main Container --- */
  .container {
    max-width: 480px;
    margin: 40px auto;
    padding: 0 20px;
    width: 100%;
  }

  .header-text {
    text-align: center;
    margin-bottom: 32px;
  }

  .header-text h1 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .header-text p {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  /* --- Card UI --- */
  .main-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
  }

  .input-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: block;
  }

  .input-box {
    position: relative;
    margin-bottom: 20px;
  }

  input[type="tel"] {
    width: 100%;
    background: #f1f5f9;
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 14px 14px 14px 46px;
    font-size: 1rem;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
    color: var(--text-dark);
  }

  input[type="tel"]:focus {
    outline: none;
    background: white;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-light);
  }

  .input-box svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .btn-check {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-check:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
  }

  /* --- Results Section --- */
  .result-section {
    margin-top: 32px;
    display: none;
    animation: fadeIn 0.4s ease;
  }

  .result-info-bar {
    background: var(--primary-light);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border: 1px solid rgba(37, 99, 235, 0.1);
  }

  .result-info-bar span {
    font-weight: 700;
    color: var(--primary);
    font-family: 'JetBrains Mono', monospace;
  }

  /* --- Quota List --- */
  .paket-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .paket-icon {
    width: 42px;
    height: 42px;
    background: var(--primary-light);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .paket-details {
    flex: 1;
  }

  .paket-name {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
    display: block;
  }

  .paket-value {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--text-dark);
    display: block;
  }

  .paket-expiry {
    font-size: 0.72rem;
    color: var(--primary);
    background: var(--primary-light);
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    margin-top: 8px;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  footer {
    margin-top: auto;
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    XTRIMER <span>TUNNEL</span>
  </a>
</nav>

<div class="container">
  <div class="header-text">
    <h1>Cek Kuota</h1>
    <p>Masukkan nomor XL atau AXIS kamu</p>
  </div>

  <div class="main-card">
    <label class="input-label">Phone Number</label>
    <div class="input-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
      <input type="tel" id="msisdn" placeholder="0878..." autocomplete="off">
    </div>

    <button id="btnCek" class="btn-check">
      <span>Cek Sekarang</span>
    </button>

    <div id="result-container" class="result-section">
      <div class="result-info-bar">
        <small style="color:var(--text-muted)">Nomor:</small>
        <span id="display-num">-</span>
      </div>
      <div id="paket-list"></div>
    </div>
  </div>
</div>

<footer>
  &copy; 2026 Xtrimer Tunnel
</footer>

<script>
  const btnCek = document.getElementById('btnCek');
  const inputPhone = document.getElementById('msisdn');
  const resultContainer = document.getElementById('result-container');
  const paketList = document.getElementById('paket-list');
  const displayNum = document.getElementById('display-num');

  function parseHasil(raw) {
    if (!raw) return [];
    
    return raw.split(/<br\s*\/?>/i)
      .map(line => line.replace(/<[^>]+>/g, '').trim())
      // Filter sampah: buang garis ===, ---, dan teks kosong
      .filter(line => line.length > 5 && !line.includes('===') && !line.includes('---'))
      .map(line => {
        // Cari sisa kuota (contoh: 10GB, 500MB)
        const quotaMatch = line.match(/(\d+(\.\d+)?\s*(GB|MB|KB|Menit|SMS))/i);
        // Cari exp date
        const expMatch = line.match(/exp\s*([\d\-\/\s:]+)/i);
        
        let value = quotaMatch ? quotaMatch[0] : "Aktif";
        let name = line.replace(value, '').replace(/exp.*$/i, '').replace(/^-/, '').trim();
        let expiry = expMatch ? expMatch[1].trim() : null; // null jika tidak ada exp

        return { name, value, expiry };
      });
  }

  function getIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('youtube')) return '📺';
    if (n.includes('sosmed') || n.includes('ig')) return '📱';
    if (n.includes('malam')) return '🌙';
    if (n.includes('game')) return '🎮';
    return '📦';
  }

  async function cekKuota() {
    const msisdn = inputPhone.value.replace(/[^0-9]/g, '');
    if (msisdn.length < 9) return;

    btnCek.disabled = true;
    btnCek.innerHTML = '<div class="spinner"></div>';
    resultContainer.style.display = 'block';
    displayNum.textContent = msisdn;
    paketList.innerHTML = '<div style="text-align:center; padding:20px;"><div class="spinner" style="margin:0 auto;"></div></div>';

    try {
      const response = await fetch(`https://apigw.kmsp-store.com/sidompul/v4/cek_kuota?msisdn=${msisdn}&isJSON=true`, {
        headers: {
          'Authorization': 'Basic c2lkb21wdWxhcGk6YXBpZ3drbXNw',
          'X-API-Key': '60ef29aa-a648-4668-90ae-20951ef90c55',
          'X-App-Version': '4.0.0'
        }
      });

      const json = await response.json();

      if (json.status && json.data.hasil) {
        const items = parseHasil(json.data.hasil);
        
        if (items.length === 0) {
          paketList.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:20px;">Tidak ada paket aktif.</p>';
        } else {
          paketList.innerHTML = items.map(item => `
            <div class="paket-card">
              <div class="paket-icon">${getIcon(item.name)}</div>
              <div class="paket-details">
                <span class="paket-name">${item.name}</span>
                <span class="paket-value">${item.value}</span>
                ${item.expiry ? `
                  <div class="paket-expiry">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    Exp: ${item.expiry}
                  </div>
                ` : ''}
              </div>
            </div>
          `).join('');
        }
      } else {
        paketList.innerHTML = `<p style="color:red; text-align:center; font-size:0.8rem;">Nomor tidak dikenali atau salah.</p>`;
      }
    } catch (e) {
      paketList.innerHTML = `<p style="color:red; text-align:center; font-size:0.8rem;">Masalah koneksi server.</p>`;
    } finally {
      btnCek.disabled = false;
      btnCek.innerHTML = '<span>Cek Sekarang</span>';
    }
  }

  btnCek.addEventListener('click', cekKuota);
</script>
</body>
</html>
