<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoy Digital Dashboard</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .sidebar { background: #fff; border-right: 1px solid #dee2e6; height: 100vh; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-zoy { background: #0d6efd; color: #fff; border-radius: 10px; }
        .nav-link.active { background: #eef5ff; color: #0d6efd !important; font-weight: 600; }
        .price-badge { background: #d1e7dd; color: #0f5132; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar Navigation -->
        <nav class="col-md-2 d-none d-md-block sidebar p-4">
            <h4 class="text-primary fw-bold mb-4">Zoy Digital</h4>
            <div class="nav flex-column nav-pills">
                <a class="nav-link active mb-2" href="#"><i class="bi bi-house-door me-2"></i> Dashboard</a>
                <a class="nav-link text-dark mb-2" href="#"><i class="bi bi-shield-check me-2"></i> VPN Tunneling</a>
                <a class="nav-link text-dark mb-2" href="#"><i class="bi bi-phone me-2"></i> PPOB Pulsa</a>
                <a class="nav-link text-dark mb-2" href="#"><i class="bi bi-receipt me-2"></i> Riwayat</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold">Halo, Partner!</h5>
                <div class="bg-white p-2 px-3 rounded-pill shadow-sm border">
                    <span class="text-muted small">Saldo:</span> <strong class="text-primary">Rp 150.000</strong>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card card-custom p-4 bg-primary text-white">
                        <h6>Diskon Reseller</h6>
                        <h2 class="fw-bold">30% Flat</h2>
                        <p class="small opacity-75">Status: Aktif</p>
                    </div>
                </div>
            </div>

            <!-- Services Section -->
            <h6 class="fw-bold mb-3">Layanan Kami</h6>
            <div class="row g-3">
                <!-- VPN Card -->
                <div class="col-md-3">
                    <div class="card card-custom p-3 text-center border">
                        <i class="bi bi-server fs-2 text-primary"></i>
                        <p class="mt-2 mb-0 fw-semibold">VPN Tunneling</p>
                    </div>
                </div>
                <!-- PPOB Card -->
                <div class="col-md-3">
                    <div class="card card-custom p-3 text-center border">
                        <i class="bi bi-lightning-charge fs-2 text-warning"></i>
                        <p class="mt-2 mb-0 fw-semibold">Pulsa & Data</p>
                    </div>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="card card-custom mt-4 p-3">
                <table class="table table-hover align-middle">
                    <thead class="text-muted small">
                        <tr><th>Layanan</th><th>Tanggal</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Paket Data Telkomsel 10GB</td>
                            <td>20 Jul 2026</td>
                            <td><span class="badge bg-success">Sukses</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

</body>
</html>
